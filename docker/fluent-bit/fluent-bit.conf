[SERVICE]
    Flush        2
    Log_Level    info
    Daemon       off
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         tail
    Path         /var/log/suricata/eve.json
    Tag          suricata.logs
    Parser       json
    DB           /fluent-bit/log/suricata.db
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On
    Refresh_Interval 10
    Read_from_Head True

[FILTER]
    Name         lua
    Match        suricata.logs
    Script       /fluent-bit/scripts/jsonb.lua
    Call         transform_record

[OUTPUT]
    Name         http
    Match        suricata.logs
    Host         axum
    Port         3000
    URI          /eve_json_log
    Format       json
    Json_Date_Format iso8601
    Json_Date_Key timestamp
    tls          off
    Retry_Limit  5
    Workers      1
    # 단일 레코드씩 전송
    Batch_size   1