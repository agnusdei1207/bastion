<source>
  @type tail
  @id suricata_logs
  tag suricata.logs
  path /var/log/suricata/eve.json
  pos_file /fluentd/log/suricata.pos
  read_from_head true
  <parse>
    @type json
  </parse>
</source>

<filter suricata.logs>
  @type record_transformer
  @id transform_suricata_logs
  enable_ruby true
  <record>
    timestamp ${time.strftime('%Y-%m-%dT%H:%M:%S%z')}
    src_ip ${record["src_ip"]}
    dest_ip ${record["dest_ip"]}
    action ${record["action"]}
    event_type ${record["event_type"]}
    log_data_jsonb ${Yajl.dump(record)}
  </record>
</filter>

<match suricata.logs>
  @type http
  @id http_output
  endpoint_url http://axum:3000/eve_json_log
  http_method post
  <format>
    @type json
  </format>
  json_array true
  <buffer>
    @type memory
    flush_interval 2s
    # whether to send in buffer at shutdown
    flush_at_shutdown true
    # chunk_limit_size 2m
    retry_forever false
    # retry_wait 10s
  </buffer>
</match>
